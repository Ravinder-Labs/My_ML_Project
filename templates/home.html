<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium AI FWI Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* Cinematic Background */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364);
            transition: background 1.5s ease-in-out; 
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 0 20px rgba(255,255,255,0.05);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
        }

        /* Input Step Animation */
        .form-step {
            display: none; 
            opacity: 0;
            transform: translateX(30px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .form-step.active {
            display: block; 
            opacity: 1;
            transform: translateX(0);
        }

        /* Custom Input Styling */
        .premium-input {
            background: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            border-radius: 12px;
            padding: 15px;
            font-size: 1.1rem;
        }
        .premium-input:focus {
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.5) !important;
            border-color: rgba(255, 152, 0, 0.8) !important;
        }

        /* Progress Bar */
        .progress { height: 8px; border-radius: 10px; background: rgba(255,255,255,0.1); margin-bottom: 30px; }
        .progress-bar { background: linear-gradient(90deg, #FFB75E, #ED8F03); transition: width 0.6s ease; }

        /* Premium Button */
        .btn-premium {
            background: linear-gradient(45deg, #FF512F, #DD2476);
            border: none;
            border-radius: 12px;
            padding: 12px 25px;
            font-weight: bold;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(221, 36, 118, 0.4);
            color: white;
        }

        /* Result Animation */
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .result-box {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff4b4b;
            border-radius: 15px;
        }
    </style>
</head>
<body id="bg-body">

<div class="glass-panel">

    <div class="text-center mb-4">
        <h2 class="fw-bold"><i class="fas fa-satellite"></i> AI Weather Core</h2>
        <p class="text-white-50">Algerian Forest Fire Risk Prediction</p>
    </div>

    <div class="progress">
        <div class="progress-bar" id="progressBar" style="width: 33%"></div>
    </div>

    <form action="{{ url_for('predict_datapoint') }}" method="POST" id="aiForm">
        
        <div class="form-step active" id="step1">
            <h4 class="mb-3 text-warning"><i class="fas fa-cloud-sun"></i> Step 1: Weather</h4>
            <div class="mb-3">
                <label>Temperature (°C)</label>
                <input type="number" step="any" class="form-control premium-input" name="Temperature" placeholder="e.g. 35" required>
            </div>
            <div class="mb-3">
                <label>RH (%)</label>
                <input type="number" step="any" class="form-control premium-input" name="RH" placeholder="e.g. 30" required>
            </div>
            <div class="mb-4">
                <label>Rain (mm)</label>
                <input type="number" step="any" class="form-control premium-input" name="Rain" placeholder="e.g. 0.0" required>
            </div>
            <div class="text-end">
                <button type="button" class="btn btn-premium" onclick="nextStep(1)">Next Step <i class="fas fa-arrow-right"></i></button>
            </div>
        </div>

        <div class="form-step" id="step2">
            <h4 class="mb-3 text-warning"><i class="fas fa-tree"></i> Step 2: Forest Indices</h4>
            <div class="mb-3">
                <label>Wind Speed (Ws)</label>
                <input type="number" step="any" class="form-control premium-input" name="Ws" placeholder="e.g. 15" required>
            </div>
            <div class="mb-3">
                <label>FFMC (Fine Fuel Code)</label>
                <input type="number" step="any" class="form-control premium-input" name="FFMC" placeholder="e.g. 90" required>
            </div>
            <div class="mb-4">
                <label>DMC (Duff Moisture Code)</label>
                <input type="number" step="any" class="form-control premium-input" name="DMC" placeholder="e.g. 35" required>
            </div>
            <div class="d-flex justify-content-between">
                <button type="button" class="btn btn-outline-light" onclick="prevStep(2)"><i class="fas fa-arrow-left"></i> Back</button>
                <button type="button" class="btn btn-premium" onclick="nextStep(2)">Next Step <i class="fas fa-arrow-right"></i></button>
            </div>
        </div>

        <div class="form-step" id="step3">
            <h4 class="mb-3 text-warning"><i class="fas fa-microchip"></i> Step 3: Spread & System</h4>
            <div class="mb-3">
                <label>ISI (Spread Index)</label>
                <input type="number" step="any" class="form-control premium-input" name="ISI" placeholder="e.g. 10" required>
            </div>
            <div class="mb-3">
                <label>Classes (0=Safe, 1=Fire)</label>
                <input type="number" step="any" class="form-control premium-input" name="Classes" placeholder="0 or 1" required>
            </div>
            <div class="mb-4">
                <label>Region (0 or 1)</label>
                <input type="number" step="any" class="form-control premium-input" name="Region" placeholder="0 or 1" required>
            </div>
            <div class="d-flex justify-content-between">
                <button type="button" class="btn btn-outline-light" onclick="prevStep(3)"><i class="fas fa-arrow-left"></i> Back</button>
                <button type="submit" class="btn btn-premium"><i class="fas fa-fire"></i> Initialize Prediction</button>
            </div>
        </div>
    </form>

    {% if result %}
    <div class="result-box p-4 mt-4 text-center">
        <h5 class="text-white-50 text-uppercase tracking-widest mb-2">Predicted FWI Level</h5>
        <h1 class="display-3 fw-bold text-danger mb-0 text-break">{{ result | round(2) }}</h1>
        <p class="mt-3 mb-0 text-white"><i class="fas fa-check-circle text-success"></i> Calculation Success</p>
    </div>
    <style> #aiForm { display: none; } .progress { display: none; } </style>
    <div class="text-center mt-4">
        <a href="/predict_data" class="btn btn-outline-light"><i class="fas fa-redo"></i> Run New Scan</a>
    </div>
    {% endif %}

</div>

<script>
    function updateGraphics(step) {
        const body = document.getElementById('bg-body');
        const bar = document.getElementById('progressBar');

        if(step === 1) {
            body.style.background = "linear-gradient(-45deg, #0f2027, #203a43, #2c5364)"; // Cool Blue
            bar.style.width = "33%";
        } else if(step === 2) {
            body.style.background = "linear-gradient(-45deg, #23074d, #cc5333)"; // Deep Purple/Orange
            bar.style.width = "66%";
        } else if(step === 3) {
            body.style.background = "linear-gradient(-45deg, #4b1212, #8e0e00)"; // Dark Red/Fire
            bar.style.width = "100%";
        }
    }

    function nextStep(current) {
        document.getElementById(`step${current}`).classList.remove('active');
        document.getElementById(`step${current + 1}`).classList.add('active');
        updateGraphics(current + 1);
    }

    function prevStep(current) {
        document.getElementById(`step${current}`).classList.remove('active');
        document.getElementById(`step${current - 1}`).classList.add('active');
        updateGraphics(current - 1);
    }
</script>

</body>
</html>
